# docker-compose.yml
version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: searchengine

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: searchengine
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search123
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
  mongo_data:
  pg_data: